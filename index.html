<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neighborhood Studios — Annual General Meeting</title>
  <style>
    :root {
      --bg: #0a0a0a;
      --fg: #f5f5f5;
      --accent: #ff5a1f;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--fg);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }
    .container { max-width: 720px; }
    .eyebrow {
      text-transform: uppercase;
      letter-spacing: 0.2em;
      font-size: 0.85rem;
      color: var(--accent);
      margin-bottom: 1.25rem;
      font-weight: 600;
    }
    h1 {
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      font-weight: 800;
      line-height: 1.05;
      margin-bottom: 1.5rem;
      letter-spacing: -0.02em;
    }
    p {
      font-size: 1.125rem;
      opacity: 0.75;
      line-height: 1.6;
    }
    .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      margin-right: 0.5rem;
      vertical-align: middle;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="eyebrow"><span class="dot"></span>Neighborhood Studios</div>
    <h1>Hello, World.</h1>
    <p>The Annual General Meeting site lives here. Real content coming soon.</p>
  </div>
</body>
</html>
